name: S3 Backup Automation

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  process-s3-backups:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        cd S3Automation
        pip install -r requirements.txt
    
    - name: Run S3 automation
      env:
        S3_REGION: eu-west-par
        S3_ENDPOINT: https://s3.eu-west-par.io.cloud.ovh.net/
        S3_BUCKET_NAME: rise-of-atlantis-csv-exports
        S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
        S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        GITHUB_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO: roarealmdata
      run: |
        cd S3Automation
        python s3_automation.py
